<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!-- Pink circle background -->
  <circle cx="48" cy="48" r="48" fill="#E91E63"/>

  <!-- Coin stack base -->
  <ellipse cx="48" cy="72" rx="22" ry="7" fill="rgba(255,255,255,0.9)"/>
  <rect x="26" y="58" width="44" height="14" fill="#FFFFFF"/>
  <ellipse cx="48" cy="58" rx="22" ry="7" fill="rgba(255,255,255,0.75)"/>

  <!-- Second coin -->
  <rect x="26" y="46" width="44" height="12" fill="rgba(255,255,255,0.88)"/>
  <ellipse cx="48" cy="46" rx="22" ry="7" fill="rgba(255,255,255,0.65)"/>

  <!-- Dollar sign -->
  <text x="48" y="69" font-family="Arial, sans-serif" font-weight="900" font-size="20" fill="#E91E63" text-anchor="middle">$</text>

  <!-- Up arrow -->
  <polyline points="62,38 70,28 78,38" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="70" y1="28" x2="70" y2="44" stroke="rgba(255,255,255,0.85)" stroke-width="3.5" stroke-linecap="round"/>
</svg>
