<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!-- Pink circle background -->
  <circle cx="48" cy="48" r="48" fill="#E91E63"/>

  <!-- Box body -->
  <rect x="20" y="42" width="56" height="36" rx="4" fill="#FFFFFF"/>

  <!-- Box top flap left -->
  <path d="M20 42 L20 30 L44 30 L44 42 Z" fill="rgba(255,255,255,0.75)" stroke="#E91E63" stroke-width="1"/>
  <!-- Box top flap right -->
  <path d="M52 30 L76 30 L76 42 L52 42 Z" fill="rgba(255,255,255,0.75)" stroke="#E91E63" stroke-width="1"/>

  <!-- Center divider line -->
  <rect x="44" y="30" width="8" height="12" fill="rgba(233,30,99,0.3)"/>

  <!-- Horizontal band on box body -->
  <rect x="20" y="54" width="56" height="6" fill="rgba(233,30,99,0.15)"/>

  <!-- Dots on box face -->
  <circle cx="34" cy="65" r="3" fill="rgba(233,30,99,0.35)"/>
  <circle cx="48" cy="65" r="3" fill="rgba(233,30,99,0.35)"/>
  <circle cx="62" cy="65" r="3" fill="rgba(233,30,99,0.35)"/>
</svg>
